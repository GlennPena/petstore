spring:
  datasource:
    url: jdbc:h2:mem:petstore;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        # Let Spring auto-detect dialect for H2/Postgres
        format_sql: true
        jdbc:
          batch_size: 20
  flyway:
    enabled: false
  sql:
    init:
      mode: never

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.pena.petstore: INFO
