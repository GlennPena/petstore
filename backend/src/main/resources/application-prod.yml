spring:
  datasource:
    url: ${DATABASE_URL}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
  sql:
    init:
      mode: never

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.pena.petstore: INFO
