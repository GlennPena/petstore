services:
  - type: web
    name: petstore-backend
    env: docker
    rootDir: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: '*'
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  - type: web
    name: petstore-frontend
    env: docker
    rootDir: frontend
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        value: https://petstore-backend-w420.onrender.com

