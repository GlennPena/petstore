services:
  - type: web
    name: petstore-backend
    env: docker
    rootDir: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: petstore-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          name: petstore-frontend
          property: url
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: $PORT

  - type: web
    name: petstore-frontend
    env: docker
    rootDir: frontend
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: petstore-backend
          property: url

  - type: pserv
    name: petstore-db
    plan: free
    ipAllowList: []

