services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: petstore
      POSTGRES_USER: petstore
      POSTGRES_PASSWORD: petstore
    ports:
      - "5432:5432"
    volumes:
      - petstore-db:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/petstore
      SPRING_DATASOURCE_USERNAME: petstore
      SPRING_DATASOURCE_PASSWORD: petstore
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  petstore-db:
